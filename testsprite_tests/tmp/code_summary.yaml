version: "2"
type: backend
tech_stack:
  - HTML
  - Vanilla CSS
  - Vanilla JS
features:
  - name: Website Homepage
    description: Landing page for the VECT brand website
    files:
      - index.html
      - style.css
      - script.js
    endpoints:
      - method: GET
        path: /index.html
        description: Load homepage HTML
        auth_required: false
        response_schema:
          "200": HTML
  - name: Website Privacy Policy
    description: Privacy info page
    files:
      - privacy.html
    endpoints:
      - method: GET
        path: /privacy.html
        description: Load privacy policy
        auth_required: false
        response_schema:
          "200": HTML
known_limitations: []
