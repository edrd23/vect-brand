<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>VECT — Avatar Instagram</title>
    <style>
        body {
            background: #020202;
            color: #FFF;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        .canvas-area {
            width: 1080px;
            height: 1080px;
            background: #070707;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border: 1px solid #111;
        }
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        /* Cornice circolare tratteggiata per aiuto visivo (rimossa in export) */
        .circle-guide {
            position: absolute;
            width: 1060px; height: 1060px;
            border: 2px dashed rgba(255, 107, 26, 0.15);
            border-radius: 50%;
            pointer-events: none;
        }
        svg {
            width: 800px; /* Al centro, sicuro per il cerchio */
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
            z-index: 10;
        }
        .btn {
            background: #FF6B1A; color: #000; border: none;
            padding: 12px 24px; border-radius: 4px; font-weight: bold;
            cursor: pointer; margin-top: 20px; font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="canvas-area" id="avatar-target">
        <div class="grid-overlay"></div>
        <div class="circle-guide" id="guide"></div>
        <svg viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- V -->
            <path d="M40 30L68 86C70 90 75 90 77 90L80 90C83 90 86 90 88 86L115 30H100L77.5 75L55 30H40Z" fill="#F5F5F5" />
            <!-- E -->
            <path d="M140 30H185V43H148Q143 43 143 48V54H178V66H143V72Q143 77 148 77H185V90H140Q130 90 130 80V40Q130 30 140 30Z" fill="#FF6B1A" />
            <!-- C -->
            <path d="M225 30H270V43H233Q228 43 228 48V72Q228 77 233 77H270V90H225Q215 90 215 80V40Q215 30 225 30Z" fill="#F5F5F5" />
            <!-- T -->
            <path d="M300 30H360V43H337V90H323V43H300V30Z" fill="#F5F5F5" />
        </svg>
    </div>
</body>
</html>
